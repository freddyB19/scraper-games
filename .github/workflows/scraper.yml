name: Scraper News

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:

    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: pip install -r ./requirements.txt
    
    - name: Run script (scraper)
      run: python ./scraper/main.py

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: Update news
        commit_user_name: Freddy Bolívar [GitHub Actions]
        commit_user_email: freddyybolivar2013@gmail.com
        commit_author: freddyB19 <freddyB19@github.com>
